[experiment]
name = "improved-swinunetr-8gb"
output_dir = "artifacts/runs/improved_8gb"

[data]
train_manifest = "artifacts/manifests/train.json"
val_manifest = "artifacts/manifests/val.json"
test_manifest = "artifacts/manifests/test.json"
num_workers = 2
cache_rate = 0.0
roi_size = [64, 64, 64]
batch_size = 1
sw_batch_size = 1
infer_overlap = 0.25

[training]
model_name = "improved"
seed = 42
epochs = 200
patience = 20
learning_rate = 0.0001
weight_decay = 0.00001
amp = true
threshold = 0.5
val_interval = 1

[model]
in_channels = 4
out_channels = 3

[hardware]
device = "cuda"

[artifacts]
checkpoint_path = "artifacts/models/improved_8gb_best.pt"
history_path = "artifacts/metrics/improved_8gb_history.csv"
summary_path = "artifacts/metrics/improved_8gb_summary.json"
