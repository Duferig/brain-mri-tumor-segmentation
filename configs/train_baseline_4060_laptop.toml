[experiment]
name = "baseline-3d-unet-4060-laptop"
output_dir = "artifacts/runs/baseline_4060_laptop"

[data]
train_manifest = "artifacts/manifests/train.json"
val_manifest = "artifacts/manifests/val.json"
test_manifest = "artifacts/manifests/test.json"
num_workers = 2
cache_rate = 0.0
roi_size = [96, 96, 96]
batch_size = 1
sw_batch_size = 1
infer_overlap = 0.5

[training]
model_name = "baseline"
seed = 42
epochs = 40
patience = 6
learning_rate = 0.0002
weight_decay = 0.00001
amp = true
threshold = 0.5
val_interval = 3

[model]
in_channels = 4
out_channels = 3

[hardware]
device = "cuda"

[artifacts]
checkpoint_path = "artifacts/models/baseline_4060_laptop_best.pt"
history_path = "artifacts/metrics/baseline_4060_laptop_history.csv"
summary_path = "artifacts/metrics/baseline_4060_laptop_summary.json"

