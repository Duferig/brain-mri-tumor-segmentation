[experiment]
name = "improved-swinunetr"
output_dir = "artifacts/runs/improved"

[data]
train_manifest = "artifacts/manifests/train.json"
val_manifest = "artifacts/manifests/val.json"
test_manifest = "artifacts/manifests/test.json"
num_workers = 4
cache_rate = 0.0
roi_size = [96, 96, 96]
batch_size = 1
sw_batch_size = 1
infer_overlap = 0.5

[training]
model_name = "improved"
seed = 42
epochs = 200
patience = 20
learning_rate = 0.0001
weight_decay = 0.00001
amp = true
threshold = 0.5
val_interval = 1

[model]
in_channels = 4
out_channels = 3

[hardware]
device = "cuda"

[artifacts]
checkpoint_path = "artifacts/models/improved_best.pt"
history_path = "artifacts/metrics/improved_history.csv"
summary_path = "artifacts/metrics/improved_summary.json"

