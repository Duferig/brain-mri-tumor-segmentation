[experiment]
name = "smoke-baseline-3d-unet"
output_dir = "artifacts/runs/smoke"

[data]
train_manifest = "artifacts/smoke_manifests/train.json"
val_manifest = "artifacts/smoke_manifests/val.json"
test_manifest = "artifacts/smoke_manifests/test.json"
num_workers = 0
cache_rate = 0.0
roi_size = [32, 32, 32]
batch_size = 1
sw_batch_size = 1
infer_overlap = 0.25

[training]
model_name = "baseline"
seed = 42
epochs = 1
patience = 2
learning_rate = 0.0002
weight_decay = 0.00001
amp = false
threshold = 0.5
val_interval = 1

[model]
in_channels = 4
out_channels = 3

[hardware]
device = "cpu"

[artifacts]
checkpoint_path = "artifacts/models/smoke_baseline_best.pt"
history_path = "artifacts/metrics/smoke_baseline_history.csv"
summary_path = "artifacts/metrics/smoke_baseline_summary.json"

